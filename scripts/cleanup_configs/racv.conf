# Cleanup config — RACV (Optima/BidEnergy interval source)
#
# Purpose: define WHICH sensors are interval-only (30-min cadence) for the
# RACV project, so the off-cadence-row purge job knows what to scope to.
# This file is sourced by scripts/glue_delete_offcadence_rows.sh.

PROJECT="racv"

# jq filter to extract sensor IDs from nem12_mappings.json.
# We only target Optima E1 / B1 mappings whose sensor IDs are under p:racv:.
# These are the sensors fed exclusively by `optima-interval-exporter`,
# whose CSV download always emits 30-min cadence.
SENSOR_MAPPING_FILTER='[to_entries[]
  | select((.key | test("^Optima_.*-(E1|B1)$"))
           and (.value | type == "string")
           and (.value | startswith("p:racv:")))
  | .value] | sort | unique | .[]'

# Where the sensor list is staged in S3 (read by the Glue job).
SENSOR_LIST_S3_URI="s3://sbm-file-ingester/cleanup/racv_interval_only_sensors.txt"

# Cadence the legitimate source uses. Rows at minute(ts) OUTSIDE this set
# are off-cadence and will be deleted. BidEnergy interval CSV is 30-min.
LEGIT_MINUTES="0,30"

# Hudi partitions to scan. Year(ts).
# Currently scoped to 2023+2024 — the remaining tail-end pollution.
# 2025/2026 were cleaned in earlier runs (see git log).
PARTITION_ITS_LIST="2023,2024"

# Optional time bounds. Leave empty for unbounded.
# Currently scoped to 2023-10-01 → 2024-02-01 (only known affected window
# for the single remaining sensor VAAA000162-E1).
START_TS="2023-10-01 00:00:00"
END_TS="2024-02-01 00:00:00"

# Sanity-check expected row count (from a pre-flight Athena query).
# The script does not enforce this — it's documentation for the operator
# to compare against the dry-run preview total.
EXPECTED_TOTAL_HINT="29,520 (1 sensor VAAA000162-E1 / p:racv:1884cc22ba9-36fd98c8; 2023-10-01..2024-01-31)"
