# Cleanup config — Bunnings (Optima/BidEnergy interval source)
#
# Purpose: define WHICH Bunnings sensors are interval-only (30-min cadence),
# so the off-cadence-row purge job knows what to scope to.
#
# IMPORTANT: this config is scoped to the OPTIMA SUBSET of Bunnings (sensors
# mapped from nem12_mappings.json via Optima_*-E1/B1 keys with p:bunnings:
# values). Bunnings-as-a-whole has OTHER sensors with legitimate continuous
# NEM12 sources — those are NOT in this scope and must not be touched.
# The Optima subset was empirically verified cadence-strict for 2024 + 2025
# (0 off-cadence rows) before scoping the cleanup.

PROJECT="bunnings"

# jq filter to extract sensor IDs from nem12_mappings.json.
SENSOR_MAPPING_FILTER='[to_entries[]
  | select((.key | test("^Optima_.*-(E1|B1)$"))
           and (.value | type == "string")
           and (.value | startswith("p:bunnings:")))
  | .value] | sort | unique | .[]'

# Where the sensor list is staged in S3.
# Scoped STRICTLY to mappings keyed by `Optima_*-(E1|B1)` under p:bunnings:.
# Per user directive (2026-05-12): cleanup must be limited to keys starting
# with `Optima_` — SEM_*-B1/K1 sensors (even if empirically cadence-strict)
# are out of scope and will NOT be cleaned in this pass.
SENSOR_LIST_S3_URI="s3://sbm-file-ingester/cleanup/bunnings_interval_only_sensors.txt"

# Cadence the legitimate source uses. BidEnergy interval CSV is 30-min.
LEGIT_MINUTES="0,30"

# Hudi partitions to scan. Currently only 2026 is polluted (verified
# 2024 + 2025 are clean for this sensor subset).
PARTITION_ITS_LIST="2026"

# Time window: 2026-04-09 .. 2026-05-06 (NEM12 schedule overlap window).
# Pre-incident verified clean.
START_TS="2026-04-09 00:00:00"
END_TS="2026-05-06 00:00:00"

# Expected count (pre-flight via Athena 2026-05-12).
EXPECTED_TOTAL_HINT="3,551,712 rows / 586 polluted / 945 in scope / 27 days (2026-04-09..2026-05-05) — Optima_ only"
